<!DOCTYPE html>
<html >

    <head>
        <meta charset="UTF-8">
        <title>price prediction</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
        <!-- <link href='https://fonts.googleapis.com/css?family=Pacifico' rel='stylesheet' type='text/css'>
        <link href='https://fonts.googleapis.com/css?family=Arimo' rel='stylesheet' type='text/css'>
        <link href='https://fonts.googleapis.com/css?family=Hind:300' rel='stylesheet' type='text/css'>
        <link href='https://fonts.googleapis.com/css?family=Open+Sans+Condensed:300' rel='stylesheet' type='text/css'> -->
      
    </head>
    
    <body>
        <div class="login">
    	<h1>House Price Prediction</h1>
    
            <!-- Main Input For Receiving Query to our ML -->
           <form action="{{ url_for('predict')}}#result" method="post">
                <label for="kitchen_area">kitchen area</label>
                <input type="text" name="kitchen_area" value="{{ request.form.kitchen_area }}" placeholder="   0.0" required="required" /><br>
                <label for="kitchen_area">bath area</label>
           	 <input type="text" name="bath_area" value="{{ request.form.bath_area }}" placeholder="   0.0" required="required" /><br>
                <label for="other_area">other area</label>
                <input type="text" name="other_area" value="{{ request.form.other_area }}" placeholder="   0.0" required="required" /><br>
                <label for="extra_area">extra area</label>
                <input type="text" name="extra_area" value="{{ request.form.extra_area }}" placeholder="   0.0" required="required" /><br>
                <label for="extra_area_count">extra area count</label>
                <input type="text" name="extra_area_count" value="{{ request.form.extra_area_count }}" placeholder="   0.0" required="required" /><br>
                <label for="year">year</label>
                <input type="text" name="year" value="{{ request.form.year }}" placeholder="   0.0" required="required" /><br>
                <label for="ceil_height">ceil height</label>
                <input type="text" name="ceil_height" value="{{ request.form.ceil_height }}" placeholder="   0.0" required="required" /><br>
                <label for="floor_max">floor max</label>
                <input type="text" name="floor_max" value="{{ request.form.floor_max }}" placeholder="   0.0" required="required" /><br>
                <label for="floor">floor</label>
                <input type="text" name="floor" value="{{ request.form.floor }}" placeholder="   0.0" required="required" /><br>
                <label for="total_area">total area</label>
                <input type="text" name="total_area" value="{{ request.form.total_area }}" placeholder="   0.0" required="required" /><br>
                <label for="bath_count">bath count</label>
                <input type="text" name="bath_count" value="{{ request.form.bath_count }}" placeholder="   0.0" required="required" /><br>
                <label for="rooms_count">rooms count</label>
                <input type="text" name="rooms_count" value="{{ request.form.rooms_count }}" placeholder="   0.0" required="required" /><br>
                <label for="gas">gas</label>
                <select name="gas">
                    <option value="Yes" {% if request.form.get('gas') == 'Yes' %}selected{% endif %}>Yes</option>
                    <option value="No" {% if request.form.get('gas') == 'No' %}selected{% endif %}>No</option>
                </select> 
                <label for="hot_water">hot water</label>              
                <select name="hot_water">
                    <option value="Yes" {% if request.form.get('hot_water') == 'Yes' %}selected{% endif %}>Yes</option>
                    <option value="No" {% if request.form.get('hot_water') == 'No' %}selected{% endif %}>No</option>
                </select>
                <label for="central_heating">central heating</label>               
                <select name="central_heating">
                    <option value="Yes" {% if request.form.get('central_heating') == 'Yes' %}selected{% endif %}>Yes</option>
                    <option value="No" {% if request.form.get('central_heating') == 'No' %}selected{% endif %}>No</option>
                </select>
                <label for="extra_area_type_name">extra area type name</label>              
                <select name="extra_area_type_name">
                    <option value="loggia" {% if request.form.get('extra_area_type_name') == 'loggia' %}selected{% endif %}>Loggia</option>
                    <option value="balcony" {% if request.form.get('extra_area_type_name') == 'balcony' %}selected{% endif %}>Balcony</option>
                </select>
                <label for="district_name">district name</label>                
                <select id="district_name" name="district_name">
                     <option value="Moskovskij" {% if request.form.get('district_name') == 'Moskovskij' %}selected{% endif %}>Pune</option>
                     <option value="Nevskij" {% if request.form.get('district_name') == 'Nevskij' %}selected{% endif %}>Satara</option>
                     <option value="Kirovskij" {% if request.form.get('district_name') == 'Kirovskij' %}selected{% endif %}>Thane</option>
                     <option value="Krasnoselskij" {% if request.form.get('district_name') == 'Krasnoselskij' %}selected{% endif %}>Nagpur</option>
                     <option value="Vyborgskij" {% if request.form.get('district_name') == 'Vyborgskij' %}selected{% endif %}>Nashik</option>
                     <option value="Centralnyj" {% if request.form.get('district_name') == 'Centralnyj' %}selected{% endif %}>Rantnagiri</option>
                     <option value="Petrogradskij" {% if request.form.get('district_name') == 'Petrogradskij' %}selected{% endif %}>Mumbai</option>
                </select>               
                <button type="submit" class="btn">Predict</button>
           </form>
    
          <br>
          <br>
         
          
        </div>
        {% if prediction_text %}
        <div class="predict" id="result">
            {{prediction_text}}
        </div>
        {% endif %}
    </body>
</html>
